kind = "web"
previewPath = "/"
title = "Universitio"
version = "1.0.0"
id = "artifacts/universitio"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 20632
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/universitio run dev"

[services.env]
PORT = "20632"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/universitio", "run", "build"]
publicDir = "artifacts/universitio/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
